<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activities</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_activities.css') }}">
</head>
<body>
    <div class="container">
        <h1>All Activities</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Itinerary</th>
                    <th>Status</th>
                    <th>Created At</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for activity in activities %}
                <tr>
                    <td>{{ activity.id }}</td>
                    <td>{{ activity.user.username }}</td>
                    <td>{{ activity.itinerary.title }}</td>
                    <td>
                        <span class="status {{ activity.status }}">{{ activity.status.title() }}</span>
                    </td>
                    <td>{{ activity.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
                    <td>
                        <button class="btn">View</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
