{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto p-6 bg-zinc-900 rounded-3xl mt-10 text-amber-300">

    <h1 class="text-3xl mb-6 text-amber-400">Edit Itinerary</h1>

    <form method="POST" class="space-y-4">
        <div>
            <label class="text-amber-300">Day</label>
            <input type="text" name="day" value="{{ itinerary.day }}" 
                   class="w-full bg-black border border-amber-400/50 rounded-3xl px-4 py-2" required>
        </div>
        <div>
            <label class="text-amber-300">Date</label>
            <input type="text" name="date_str" value="{{ itinerary.date_str }}" 
                   class="w-full bg-black border border-amber-400/50 rounded-3xl px-4 py-2" required>
        </div>
        <div>
            <label class="text-amber-300">Title</label>
            <input type="text" name="title" value="{{ itinerary.title }}" 
                   class="w-full bg-black border border-amber-400/50 rounded-3xl px-4 py-2" required>
        </div>
        <div>
            <label class="text-amber-300">Description</label>
            <textarea name="description" rows="4" 
                      class="w-full bg-black border border-amber-400/50 rounded-3xl px-4 py-2" required>{{ itinerary.description }}</textarea>
        </div>
        <button type="submit" class="bg-amber-400 text-black px-6 py-3 rounded-3xl font-semibold hover:bg-amber-300 transition">
            Save Changes
        </button>
    </form>

    <a href="{{ url_for('admin.dashboard') }}" class="text-amber-400 mt-4 inline-block hover:underline">← Back to Dashboard</a>

</div>
{% endblock %}
