<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_activities.css') }}">
</head>
<body>
<div class="container">
    <h1>Edit User</h1>
    <form method="POST">
        <label>Username:</label>
        <input type="text" name="username" value="{{ user.username }}" required>
        <label>Email:</label>
        <input type="email" name="email" value="{{ user.email }}" required>
        <button class="btn" type="submit">Update</button>
    </form>
</div>
</body>
</html>
