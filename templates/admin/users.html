<!-- templates/admin/users.html -->
{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-6 py-12">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-5xl font-light tracking-tight">Registered Users</h1>
        <div class="text-amber-300">
            Total: <span class="text-white font-semibold">{{ users|length }}</span> users
        </div>
    </div>

    <div class="bg-zinc-900 rounded-3xl overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-amber-400/30">
                    <th class="text-left py-6 px-8">Name</th>
                    <th class="text-left py-6 px-8">Email</th>
                    <th class="text-left py-6 px-8">Role</th>
                    <th class="text-left py-6 px-8">Joined</th>
                    <th class="text-center py-6 px-8">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-amber-400/10">
                {% for user in users %}
                <tr class="hover:bg-zinc-800 transition">
                    <td class="py-6 px-8 font-medium">{{ user.name }}</td>
                    <td class="py-6 px-8 text-amber-200">{{ user.email }}</td>
                    <td class="py-6 px-8">
                        <span class="px-5 py-1 text-xs rounded-3xl 
                            {% if user.role == 'admin' %}bg-amber-400 text-black{% else %}bg-zinc-700{% endif %}">
                            {{ user.role|upper }}
                        </span>
                    </td>
                    <td class="py-6 px-8 text-sm text-amber-300">
                        {{ user.created_at.strftime('%d %b %Y') }}
                    </td>
                    <td class="py-6 px-8 text-center flex justify-center gap-2">
                        <!-- Edit Button -->
                        <a href="{{ url_for('admin.edit_user', user_id=user.id) }}"
                           class="px-4 py-2 text-xs border border-amber-400/50 hover:border-amber-400 rounded-3xl bg-amber-500 hover:bg-amber-400 text-black">
                            Edit
                        </a>
                        <!-- Delete Button -->
                        <a href="{{ url_for('admin.delete_user', user_id=user.id) }}"
                           onclick="return confirm('Are you sure you want to delete this user?');"
                           class="px-4 py-2 text-xs border border-red-500/50 hover:border-red-500 rounded-3xl bg-red-600 hover:bg-red-500 text-white">
                            Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
