<!-- templates/itineraries.html -->
{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-6 py-12">
    <div class="flex justify-between items-end mb-10">
        <div>
            <h1 class="text-5xl font-light tracking-tight">Your Santorini Itinerary</h1>
            <p class="text-amber-300">June 15 – 22, 2026 • Private Villa Experience</p>
        </div>
    </div>

    <div class="space-y-8 mb-16">
        {% for item in itineraries %}
        <div class="bg-zinc-900 rounded-3xl p-8 flex flex-col md:flex-row gap-8 card-hover">
            <div class="md:w-32 text-center flex-shrink-0">
                <div class="text-amber-400 text-sm">{{ item.date_str or 'TBD' }}</div>
                <div class="text-5xl font-light mt-1">{{ item.day }}</div>
            </div>
            
            <div class="flex-1">
                <h3 class="text-2xl font-medium">{{ item.title }}</h3>
                <p class="text-amber-200 mt-4 leading-relaxed">{{ item.description }}</p>
            </div>

            <div class="md:w-52">
                <form method="POST" action="{{ url_for('user.accept_activity', itinerary_id=item.id) }}">
                    <button type="submit" class="w-full gold-button py-6 rounded-3xl text-lg font-semibold">
                        Accept & Join
                    </button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="bg-zinc-900 rounded-3xl overflow-hidden">
        <div class="p-6 border-b border-amber-400/20">
            <h2 class="text-2xl">Live Geographical Map</h2>
        </div>
        <div id="map" class="h-96 w-full"></div>
    </div>
</div>
{% endblock %}
