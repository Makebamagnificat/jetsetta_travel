<!-- templates/signup.html -->
{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-black">
    <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-md">
        <h2 class="text-4xl font-light text-center mb-8">Create Account</h2>
        
        <form method="POST" action="{{ url_for('auth.signup') }}">
            <div class="space-y-6">
                <input type="text" name="name" placeholder="Full Name" 
                       class="w-full bg-black border border-amber-400/30 rounded-3xl px-6 py-5" required>
                
                <input type="email" name="email" placeholder="Email Address" 
                       class="w-full bg-black border border-amber-400/30 rounded-3xl px-6 py-5" required>
                
                <input type="password" name="password" placeholder="Password" 
                       class="w-full bg-black border border-amber-400/30 rounded-3xl px-6 py-5" required>
                
                <button type="submit" 
                        class="w-full gold-button py-6 rounded-3xl text-lg">
                    Create Account
                </button>
            </div>
        </form>
        
        <p class="text-center mt-8 text-sm">
            Already have an account? 
            <a href="{{ url_for('auth.login') }}" class="text-amber-400 hover:underline">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
